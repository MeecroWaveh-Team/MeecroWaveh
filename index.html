<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeecroWaveh</title>
    <meta name="description" content="MeecroWaveh is a web application that provides a map-based interface for users to locate microwaves, vending machines and printers on the BYUI campus.">
    <meta name="author" content="Boston Wyatt, Ethan Gilchrist, Kade Barker, Lev Zurcher, Nefi Raul Serrano Ramirez, Tanner Wyman">
    <meta name="google-site-verification" content="7IFDWlV9BJ4_FqkPQYjjoIj02o0wOKId_ehMVFxM3p8" />
    <link rel="icon" type="image/x-icon" href="/icons/icon-microwave_32x32.ico">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <link rel="stylesheet" href="css_files/MeecroWaveh.css">
    <link rel="stylesheet" href="css_files/tailwind.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js_files/menu.js" defer></script>
</head>

<body class="bg-blue-100 text-slate-800 transition-colors duration-300">
    <header class="relative flex justify-between items-center p-4">

        <div id="logo" class="flex items-center gap-3">
            <img class="icon w-20 h-20" src="images/icon-microwave_200x200.png">
            <h1 class="text-3xl font-bold">MeecroWaveh</h1>
        </div>

        <nav class="desktop-nav">

            <a href="index.html">Map</a>

            <a href="contact.html">Contact</a>

            <button id="theme" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700">Dark Mode</button>

        </nav>

        <button id="hamburger" class="md:hidden text-4xl p-2" aria-label="Menu">☰</button>

        <nav id="mobile-menu" class="absolute top-full right-4 mt-2 bg-white dark:bg-slate-800 rounded-lg shadow-lg p-4 w-52 z-[1000]">

            <div class="flex flex-col gap-3">

                <a href="index.html">Map</a>
                <a href="contact.html">Contact</a>

                <button id="theme-mobile" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700">Dark Mode</button>

            </div>

        </nav>

    </header>
    
    <div class="explanation">
        <p>Find microwaves, vending machines, and printers on the BYU-I campus.</p>
    </div>

    <div class="filter-container">
            <label><input type="checkbox" id="showMicrowaves" checked>Microwaves</label>
            <label><input type="checkbox" id="showPrinters" checked>Printers</label>
            <label><input type="checkbox" id="showVending" checked>Vending Machines</label>
    </div>

    <div id="map"></div>                        <!-- The map gets loaded here -->
    <div id="item_details"></div>               <!-- Details about respective item (microwave, vendor, printer) show up here -->
    <div id="review_section"></div>             <!-- Users can rate the item and add comments about the item that will show up publicly -->
    <div id="item_report_section"></div>        <!-- Used for reporting on things like cleanliness, location change, and incorrect information -->
    <div id="general_report_section"></div>     <!-- Used for reporting new locations of items, functionality issues, or general issues -->

    <div id="review_contatiner" class="p-4 max-w-xl mx-auto">
        <h2 id="Review" class="text-xl font-bold mb-2">Select a microwave on the map</h2>
        <p id="review_target_details" class="text-sm text-slate-600 mb-3">Choose a microwave marker to connect your review to that location.</p>

        <form class="flex flex-col gap-3">
            <input type="hidden" id="review-target-id" name="review-target-id" value="">
            <textarea
                id="user-review"
                name="user-review"
                rows="3"
                placeholder="Share your thoughts..."
                class="w-full p-3 rounded-lg border border-slate-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-800 dark:text-white dark:border-slate-600 transition-colors"></textarea>

            <button type="submit" class="self-end px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition-colors">Submit</button>
        </form>
    </div>

    <script type="module" src="js_files/map.js" defer></script>
    <script src="js_files/theme.js" defer></script>
    <script type="module" src="js_files/navigation.js" defer></script>

    <footer>
        <h6>MeecroWaveh</h6>
    </footer>
</body>
</html>
