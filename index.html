<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeecroWaveh</title>
    <meta name="description" content="MeecroWaveh is a web application that provides a map-based interface for users to locate microwaves, vending machines and printers on the BYUI campus.">
    <meta name="author" content="Boston Wyatt, Ethan Gilchrist, Kade Barker, Lev Zurcher, Nefi Raul Serrano Ramirez, Tanner Wyman">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <link rel="stylesheet" href="css_files/MeecroWaveh.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
</head>
<body>
    <h1>MeecroWaveh</h1>
    <p>Find microwaves, vending machines, and printers on the BYU-I campus.</p>
    <div id="map"></div>                        <!-- The map gets loaded here -->
    <div id="item_details"></div>               <!-- Details about respective item (microwave, vendor, printer) show up here -->
    <div id="review_section"></div>             <!-- Users can rate the item and add comments about the item that will show up publicly -->
    <div id="item_report_section"></div>        <!-- Used for reporting on things like cleanliness, location change, and incorrect information -->
    <div id="general_report_section"></div>     <!-- Used for reporting new locations of items, functionality issues, or general issues -->
    
    <script src="js_files/map.js" defer></script>
</body>

<footer></footer>
</html>
